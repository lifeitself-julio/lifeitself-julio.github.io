baseURL = "https://lifeitself-julio.github.io/"
languageCode = "ja"
defaultContentLanguage = "ja"
title = "Life Itself"
theme = "PaperMod"
hasCJKLanguage = true
timeZone = "Asia/Tokyo"
paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[params]
  author = "藤永フリオ"
  description = "Life Itself — 日々の記録"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  dateFormat = "2006年1月2日"

[params.homeInfoParams]
  Title = "Life Itself"
  Content = "日々の思考と記録"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/yasufuji97"

[[menus.main]]
  name = "Diary"
  url = "/posts/"
  weight = 10

[[menus.main]]
  name = "Memories"
  url = "/categories/memories/"
  weight = 20

[[menus.main]]
  name = "Language"
  url = "/categories/language/"
  weight = 30

[[menus.main]]
  name = "About"
  url = "/about/"
  weight = 40

[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[minify]
  disableXML = true
  minifyOutput = true
