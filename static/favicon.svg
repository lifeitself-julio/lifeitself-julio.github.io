<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 角丸黒背景 -->
  <rect width="100" height="100" rx="14" fill="#0f0f0f"/>
  <!-- カップ本体（丸いゴード） -->
  <ellipse cx="50" cy="70" rx="23" ry="25" fill="#fff"/>
  <!-- ネック -->
  <rect x="41" y="44" width="18" height="18" fill="#fff"/>
  <!-- リム -->
  <ellipse cx="50" cy="44" rx="12" ry="6" fill="#fff"/>
  <!-- 開口部 -->
  <ellipse cx="50" cy="45" rx="8" ry="4" fill="#0f0f0f"/>
  <!-- ボンビーリャ（ストロー） -->
  <line x1="54" y1="56" x2="76" y2="8"
        stroke="#fff" stroke-width="4.5" stroke-linecap="round"/>
  <!-- フィルター -->
  <ellipse cx="54" cy="60" rx="5" ry="3.5" fill="#bebebe"/>
  <!-- マウスピース -->
  <circle cx="76" cy="8" r="3.5" fill="#fff"/>
</svg>